};const toDS=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

const nthWd=s=>Math.ceil(new Date(s+"T00:00:00").getDate()/7);

function mRec(rc,ds){if(!rc)return false;const{type,days,nth,weekday}=rc;if(type==="daily")return true;if(type==="weekly")return days?.includes(dIdx(ds));if(type==="monthly")return days?.includes(dOfM(ds));if(type==="nth_weekday")return dIdx(ds)===weekday&&nthWd(ds)===nth;return false}

function BChart({data,labels,title}){const ref=useRef(null);const ch=useRef(null);const dk=document.documentElement.getAttribute("data-theme")==="dark";

    return()=>ch.current?.destroy()},[data,labels,dk]);

function PChart({data,labels,colors,title}){const ref=useRef(null);const ch=useRef(null);const dk=document.documentElement.getAttribute("data-theme")==="dark";

    ch.current=new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors||[cs.getPropertyValue("--pie1").trim(),cs.getPropertyValue("--pie2").trim(),cs.getPropertyValue("--pie3").trim(),cs.getPropertyValue("--pie4").trim(),cs.getPropertyValue("--pie5").trim()],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"bottom",labels:{color:cs.getPropertyValue("--t2").trim(),font:{size:10},padding:10,usePointStyle:true,pointStyle:"circle"}},title:{display:!!title,text:title,color:cs.getPropertyValue("--t2").trim(),font:{size:11,weight:300}}}}});
    return()=>ch.current?.destroy()},[data,labels,dk]);
  return<div style={{position:"relative",height:200}}><canvas ref={ref}/></div>}

function LifeCD({birthday,lifeExp}){const[,setT]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setT(t=>t+1),1000);return()=>clearInterval(iv)},[]);
  if(!birthday)return<div style={{padding:"8px 0",fontSize:11,color:"var(--t4)",textAlign:"center"}}>設定で誕生日を入力</div>;
  const b=new Date(birthday+"T00:00:00");const n=new Date();const aMs=n-b;const aY=aMs/(365.25*24*3600000);
  const dD=new Date(b.getTime()+lifeExp*365.25*24*3600000);const rMs=dD-n;if(rMs<=0)return null;
  const rS=Math.floor(rMs/1000);const rD=Math.floor(rS/86400);const rY=Math.floor(rD/365.25);const rd=rD-Math.floor(rY*365.25);
  const hh=Math.floor((rS%86400)/3600);const mm=Math.floor((rS%3600)/60);const ss=rS%60;const pct=Math.min(100,Math.round(aY/lifeExp*10000)/100);
  return<div style={{padding:"10px 0 8px"}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--t3)",marginBottom:4}}>
      <span>LIFE {Math.floor(aY)}歳/{lifeExp}歳</span><span>{pct}%</span>
    </div>
    <div style={{height:3,background:"var(--bg3)",borderRadius:2,overflow:"hidden",marginBottom:6}}>
      <div style={{height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,var(--chart1),var(--t4))",borderRadius:2}}/>
    </div>
    <div style={{display:"flex",justifyContent:"center",gap:8,fontVariantNumeric:"tabular-nums",fontFamily:M}}>
      {[[rY,"年"],[rd,"日"],[hh,"時"],[mm,"分"],[ss,"秒"]].map(([v,u],i)=><div key={i} style={{textAlign:"center"}}>
        <div style={{fontSize:i<2?16:13,fontWeight:200,color:i<2?"var(--t1)":"var(--t2)"}}>{v}</div>
        <div style={{fontSize:8,color:"var(--t4)"}}>{u}</div>
      </div>)}
    </div>
  </div>}

        <div style={{fontSize:16,color:"var(--amber-t)",fontWeight:300,marginBottom:4}}>⚡ 割り込み</div>
        <div style={{fontSize:12,color:"var(--t3)",marginBottom:10}}>実行中タスクは自動中断</div>
        <input style={{...I,marginBottom:8}} value={intNm} onChange={e=>setIntNm(e.target.value)} placeholder="内容" autoFocus/>
        <div style={{display:"flex",gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>見積</div><input type="number" style={I} value={intE} onChange={e=>setIntE(e.target.value)}/></div><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>セクション</div><select style={Sl} value={intSc} onChange={e=>setIntSc(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div></div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>モード</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:10}}>{MODES.map(m=><button key={m.id} onClick={()=>setIntMd(m.id)} style={{background:intMd===m.id?m.bg:"transparent",border:`1px solid ${intMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"5px 8px",fontSize:11,color:intMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F}}>{m.icon} {m.name}</button>)}</div>
        <div style={{display:"flex",gap:8}}><button onClick={addInt} style={{...B,flex:1,color:"var(--amber-t)"}}>開始</button><button onClick={()=>setIntM(false)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
      </div></div>}
      {routeM&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}><div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:380,maxHeight:"85vh",overflow:"auto"}}>
        <div style={{fontSize:16,fontWeight:300,marginBottom:14}}>{routeM==="new"?"新規ルーチン":"編集"}</div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>名前</div><input style={{...I,marginBottom:8}} value={rNm} onChange={e=>setRNm(e.target.value)} autoFocus/>
        <div style={{display:"flex",gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>見積</div><input type="number" style={I} value={rE} onChange={e=>setRE(e.target.value)}/></div><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>セクション</div><select style={Sl} value={rSc} onChange={e=>setRSc(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div></div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>モード</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>{MODES.map(m=><button key={m.id} onClick={()=>setRMd(m.id)} style={{background:rMd===m.id?m.bg:"transparent",border:`1px solid ${rMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"5px 8px",fontSize:11,color:rMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F}}>{m.icon} {m.name}</button>)}</div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>繰り返し</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:8}}>{[["daily","毎日"],["weekly","毎週"],["monthly","毎月"],["nth_weekday","第N曜"]].map(([v,l])=><button key={v} onClick={()=>{setRTy(v);setRDs([])}} style={{...B,fontSize:10,padding:"5px 8px",background:rTy===v?"var(--bg4)":"transparent",color:rTy===v?"var(--t1)":"var(--t3)"}}>{l}</button>)}</div>
        {rTy==="weekly"&&<div style={{display:"flex",gap:3,marginBottom:8}}>{["日","月","火","水","木","金","土"].map((d,i)=><button key={i} onClick={()=>setRDs(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{...B,fontSize:10,padding:"5px 8px",minWidth:28,background:rDs.includes(i)?"var(--bg4)":"transparent",color:rDs.includes(i)?"var(--t1)":"var(--t3)"}}>{d}</button>)}</div>}
        {rTy==="monthly"&&<div style={{display:"flex",flexWrap:"wrap",gap:2,marginBottom:8}}>{Array.from({length:31},(_,i)=>i+1).map(d=><button key={d} onClick={()=>setRDs(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d])} style={{...B,fontSize:9,padding:"3px 5px",minWidth:22,background:rDs.includes(d)?"var(--bg4)":"transparent",color:rDs.includes(d)?"var(--t1)":"var(--t3)"}}>{d}</button>)}</div>}
        {rTy==="nth_weekday"&&<div style={{display:"flex",gap:6,marginBottom:8}}><select style={Sl} value={rN} onChange={e=>setRN(+e.target.value)}>{[1,2,3,4,5].map(n=><option key={n} value={n}>第{n}</option>)}</select><select style={Sl} value={rW} onChange={e=>setRW(+e.target.value)}>{["日","月","火","水","木","金","土"].map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>}
        <div style={{display:"flex",gap:6}}><button onClick={saveRt} style={{...B,flex:1,color:"var(--t1)"}}>保存</button>{routeM!=="new"&&<button onClick={()=>{setRt(p=>p.filter(r=>r.id!==routeM));setRouteM(null);sT("削除")}} style={{...B,color:"var(--red-t)"}}>削除</button>}<button onClick={()=>setRouteM(null)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
      </div></div>}
      {aa&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeModal .15s"}}><div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:360}}>
        <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",marginBottom:4}}>完了</div>
        <div style={{fontSize:17,fontWeight:300,marginBottom:14}}>{aa.name}</div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {aa.nxId&&<button onClick={()=>hAA("next")} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t1)",fontSize:14,fontWeight:300,fontFamily:F,padding:"11px 14px",cursor:"pointer",textAlign:"left"}}>▶ 次: {aa.nxNm}</button>}
          <button onClick={()=>hAA("break")} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t2)",fontSize:14,fontWeight:300,fontFamily:F,padding:"11px 14px",cursor:"pointer",textAlign:"left"}}>☕ 休憩</button>
          <button onClick={()=>hAA("interrupt")} style={{background:"var(--bg4)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t2)",fontSize:14,fontWeight:300,fontFamily:F,padding:"11px 14px",cursor:"pointer",textAlign:"left"}}>⏸ 中断（続き追加）</button>
          <button onClick={()=>setAA(null)} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:4,color:"var(--t3)",fontSize:12,fontFamily:F,padding:"9px 14px",cursor:"pointer"}}>閉じる</button>
        </div>
      </div></div>}

      {/* Edit Task Modal */}
      {editTask&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}><div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:360}}>
        <div style={{fontSize:16,fontWeight:300,marginBottom:14}}>タスクを編集</div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>タスク名</div>
        <input style={{...I,marginBottom:8}} value={etNm} onChange={e=>setEtNm(e.target.value)} autoFocus/>
        <div style={{display:"flex",gap:8,marginBottom:8}}><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>見積(分)</div><input type="number" style={I} value={etEst} onChange={e=>setEtEst(e.target.value)}/></div><div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:3}}>セクション</div><select style={Sl} value={etSec} onChange={e=>setEtSec(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div></div>
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>モード</div>
        <div style={{display:"flex",gap:3,flexWrap:"wrap",marginBottom:10}}>{MODES.map(m=><button key={m.id} onClick={()=>setEtMd(m.id)} style={{background:etMd===m.id?m.bg:"transparent",border:`1px solid ${etMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"5px 8px",fontSize:11,color:etMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F}}>{m.icon} {m.name}</button>)}</div>
        {(etStart||etEnd)&&<React.Fragment>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>実行時刻</div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:10,color:"var(--t4)",marginBottom:3}}>開始</div><input type="time" style={I} value={etStart} onChange={e=>setEtStart(e.target.value)}/></div>
            <span style={{color:"var(--t4)",marginTop:14}}>→</span>
            <div style={{flex:1}}><div style={{fontSize:10,color:"var(--t4)",marginBottom:3}}>終了</div><input type="time" style={I} value={etEnd} onChange={e=>setEtEnd(e.target.value)}/></div>
          </div>
        </React.Fragment>}
        <div style={{display:"flex",gap:8}}><button onClick={saveEdit} style={{...B,flex:1,color:"var(--t1)"}}>保存</button><button onClick={()=>setEditTask(null)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
      </div></div>}

      <div style={{position:"fixed",bottom:toast?28:-60,left:"50%",transform:"translateX(-50%)",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"10px 24px",fontSize:14,color:"var(--t1)",transition:"bottom .4s cubic-bezier(.4,0,.2,1)",zIndex:500,whiteSpace:"nowrap"}}>{toast}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
// ── PWA Manifest ──
(function(){
  const icon=document.querySelector('link[rel="apple-touch-icon"]')?.href||"";
  const manifest={name:"Habit Chain",short_name:"Habit Chain",start_url:"./habit-tracker-mobile.html",display:"standalone",background_color:"#07070a",theme_color:"#07070a",orientation:"portrait",icons:[{src:icon,sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:icon,sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
  const link=document.createElement("link");link.rel="manifest";link.href=URL.createObjectURL(blob);
  document.head.appendChild(link);
})();
// ── Service Worker ──
if("serviceWorker" in navigator){
  const sw=`const CACHE="hc-mobile-v1";self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll([self.location.pathname]))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{const clone=res.clone();caches.open(CACHE).then(c=>c.put(e.request,clone));return res}))));`;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
