@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

@keyframes fadeModal{from{opacity:0}to{opacity:1}}

<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;
const SK="hc-taskchute-v1",F="'Helvetica Neue','SF Pro Display',-apple-system,sans-serif";

// ── Firebase Setup ──
const firebaseConfig={
  apiKey:"AIzaSyAZJY0sH9TgcsJ_pVwsUwUoIzbNxBLoLH0",
  authDomain:"habit-chain-894e2.firebaseapp.com",
  databaseURL:"https://habit-chain-894e2-default-rtdb.firebaseio.com",
  projectId:"habit-chain-894e2",
  storageBucket:"habit-chain-894e2.firebasestorage.app",
  messagingSenderId:"415589772718",
  appId:"1:415589772718:web:686cb8d401758c2ca62c3f"
};
firebase.initializeApp(firebaseConfig);
const fbDb=firebase.database();
const fbRef=fbDb.ref("habit-chain-data");

const sto={
  get(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}},
  del(k){try{localStorage.removeItem(k)}catch{}}
};const toDS=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const td=()=>toDS(new Date());const now=()=>{const n=new Date();return`${String(n.getHours()).padStart(2,"0")}:${String(n.getMinutes()).padStart(2,"0")}`};
const dL=s=>["日","月","火","水","木","金","土"][new Date(s+"T00:00:00").getDay()];
const dIdx=s=>new Date(s+"T00:00:00").getDay();const dOfM=s=>new Date(s+"T00:00:00").getDate();
const nthWd=s=>Math.ceil(new Date(s+"T00:00:00").getDate()/7);
const tMin=t=>{if(!t)return 0;const[h,m]=t.split(":").map(Number);return h*60+m};
const minToT=m=>`${String(Math.floor(m/60)%24).padStart(2,"0")}:${String(m%60).padStart(2,"0")}`;
const fD=m=>{if(m==null||m<0)return"";if(m<60)return`${m}分`;const h=Math.floor(m/60);const r=m%60;return r?`${h}h${r}m`:`${h}h`};
const fS=m=>m<60?`${m}m`:`${Math.floor(m/60)}h${m%60?m%60+"m":""}`;
const ago=n=>{const d=new Date();d.setDate(d.getDate()-n);return toDS(d)};

const DS=[{id:"s1",name:"朝",start:"06:00",end:"09:00",icon:"🌅"},{id:"s2",name:"午前",start:"09:00",end:"12:00",icon:"☀"},{id:"s3",name:"午後",start:"12:00",end:"15:00",icon:"🏙"},{id:"s4",name:"夕方",start:"15:00",end:"18:00",icon:"🌇"},{id:"s5",name:"夜",start:"18:00",end:"21:00",icon:"🌙"}];
const MODES=[{id:"focus",name:"集中",icon:"🎯",color:"#7eb8da",bg:"rgba(126,184,218,0.12)"},{id:"comm",name:"連絡",icon:"💬",color:"#a78bda",bg:"rgba(167,139,218,0.12)"},{id:"move",name:"移動",icon:"🚶",color:"#dac07e",bg:"rgba(218,192,126,0.12)"},{id:"think",name:"思考",icon:"🧠",color:"#7edaaa",bg:"rgba(126,218,170,0.12)"},{id:"prep",name:"準備",icon:"🔧",color:"#da9a5a",bg:"rgba(218,154,90,0.12)"},{id:"consume",name:"消費",icon:"📺",color:"#c77dba",bg:"rgba(199,125,186,0.12)"},{id:"exercise",name:"運動",icon:"💪",color:"#5ab8a0",bg:"rgba(90,184,160,0.12)"},{id:"meal",name:"食事",icon:"🍽",color:"#d4a86a",bg:"rgba(212,168,106,0.12)"},{id:"routine",name:"作業",icon:"⚙",color:"#da8b8b",bg:"rgba(218,139,139,0.12)"},{id:"other",name:"その他",icon:"📌",color:"#a0a0aa",bg:"rgba(160,160,170,0.12)"}];
const modeMap=Object.fromEntries(MODES.map(m=>[m.id,m]));
const DR=[{id:"r1",name:"読書",est:30,section:"s1",recur:{type:"daily"},icon:"📖",mode:"focus"},{id:"r2",name:"コーディング練習",est:60,section:"s2",recur:{type:"daily"},icon:"⌨",mode:"focus"},{id:"r3",name:"英語学習",est:25,section:"s3",recur:{type:"daily"},icon:"🗣",mode:"focus"},{id:"r4",name:"振り返りノート",est:15,section:"s5",recur:{type:"daily"},icon:"✍",mode:"think"},{id:"r5",name:"週次レビュー",est:30,section:"s4",recur:{type:"weekly",days:[0]},icon:"📊",mode:"think"}];

function mRec(rc,ds){if(!rc)return false;const{type,days,nth,weekday}=rc;if(type==="daily")return true;if(type==="weekly")return days?.includes(dIdx(ds));if(type==="monthly")return days?.includes(dOfM(ds));if(type==="nth_weekday")return dIdx(ds)===weekday&&nthWd(ds)===nth;return false}
function isD(v){if(!v)return false;if(v===true||typeof v==="string")return true;return!!(v.s&&v.e)}
function isR(v){if(!v||v===true||typeof v==="string")return false;return!!(v.s&&!v.e)}

// ── Chart Components ──
function BarChart({data,labels,title}){
  const ref=useRef(null);const chart=useRef(null);
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    const cs=getComputedStyle(document.documentElement);
    chart.current=new Chart(ref.current,{type:"bar",data:{labels,datasets:[{data,backgroundColor:cs.getPropertyValue("--chart1").trim(),borderRadius:3,barThickness:20}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},title:{display:!!title,text:title,color:cs.getPropertyValue("--t2").trim(),font:{size:12,weight:300,family:F}}},
    scales:{x:{ticks:{color:cs.getPropertyValue("--t3").trim(),font:{size:10}},grid:{display:false}},y:{ticks:{color:cs.getPropertyValue("--t4").trim(),font:{size:10},callback:v=>v+"%"},grid:{color:cs.getPropertyValue("--border").trim()},max:100}}}});
    return()=>{if(chart.current)chart.current.destroy()};
  },[data,labels,isDark]);
  return <div style={{position:"relative",height:180}}><canvas ref={ref}/></div>;
}
function PieChart({data,labels,colors,title}){
  const ref=useRef(null);const chart=useRef(null);
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";
  useEffect(()=>{
    if(chart.current)chart.current.destroy();
    const cs=getComputedStyle(document.documentElement);
    chart.current=new Chart(ref.current,{type:"doughnut",data:{labels,datasets:[{data,backgroundColor:colors||[cs.getPropertyValue("--pie1").trim(),cs.getPropertyValue("--pie2").trim(),cs.getPropertyValue("--pie3").trim(),cs.getPropertyValue("--pie4").trim(),cs.getPropertyValue("--pie5").trim()],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{position:"bottom",labels:{color:cs.getPropertyValue("--t2").trim(),font:{size:11,family:F},padding:12,usePointStyle:true,pointStyle:"circle"}},title:{display:!!title,text:title,color:cs.getPropertyValue("--t2").trim(),font:{size:12,weight:300,family:F}}}}});
    return()=>{if(chart.current)chart.current.destroy()};
  },[data,labels,isDark]);
  return <div style={{position:"relative",height:220}}><canvas ref={ref}/></div>;
}

// ── Life Countdown ──
function LifeCountdown({birthday,lifeExp}){
  const[tick,setTick]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setTick(t=>t+1),1000);return()=>clearInterval(iv)},[]);
  if(!birthday)return <div style={{padding:"12px 0",fontSize:13,color:"var(--t4)",textAlign:"center"}}>設定タブで誕生日を入力してください</div>;
  const birth=new Date(birthday+"T00:00:00");const nowD=new Date();
  const ageMs=nowD-birth;const ageY=ageMs/(365.25*24*3600*1000);
  const deathDate=new Date(birth.getTime()+lifeExp*365.25*24*3600*1000);
  const remainMs=deathDate-nowD;
  if(remainMs<=0)return <div style={{padding:"12px 0",fontSize:13,color:"var(--t4)",textAlign:"center"}}>—</div>;
  const remS=Math.floor(remainMs/1000);const remD=Math.floor(remS/86400);const remY=Math.floor(remD/365.25);
  const remDays=remD-Math.floor(remY*365.25);
  const hh=Math.floor((remS%86400)/3600);const mm=Math.floor((remS%3600)/60);const ss=remS%60;
  const pct=Math.min(100,Math.round((ageY/lifeExp)*10000)/100);
  return(
    <div style={{padding:"10px 0 6px",borderBottom:"1px solid var(--border)",marginBottom:4}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <div style={{fontSize:11,color:"var(--t3)",letterSpacing:".06em"}}>LIFE — {Math.floor(ageY)}歳 / {lifeExp}歳</div>
        <div style={{fontSize:11,color:"var(--t4)"}}>{pct}% 経過</div>
      </div>
      <div style={{height:3,background:"var(--bg3)",borderRadius:2,overflow:"hidden",marginBottom:8}}>
        <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg, var(--chart1), var(--t4))`,borderRadius:2,transition:"width 1s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:12,fontVariantNumeric:"tabular-nums"}}>
        {[[remY,"年"],[remDays,"日"],[hh,"時"],[mm,"分"],[ss,"秒"]].map(([v,u],i)=>(
          <div key={i} style={{textAlign:"center"}}>
            <div style={{fontSize:i<2?20:16,fontWeight:200,color:i<2?"var(--t1)":"var(--t2)",lineHeight:1.2}}>{v}</div>
            <div style={{fontSize:9,color:"var(--t4)",marginTop:1}}>{u}</div>
          </div>
        ))}
      </div>
      <div style={{fontSize:10,color:"var(--t5)",textAlign:"center",marginTop:4}}>残り時間</div>
    </div>
  );
}

function App(){
  const[theme,setTheme]=useState(()=>localStorage.getItem("hc-theme")||"dark");
  const[routines,setRt]=useState(DR);const[sections,setSc]=useState(DS);const[extras,setEx]=useState([]);const[comp,setCp]=useState({});
  const[sel,setSel]=useState(td());const[view,setView]=useState("timeline");
  const[toast,setToast]=useState("");const[loaded,setLoaded]=useState(false);
  const[aa,setAA]=useState(null);
  const[intM,setIntM]=useState(false);const[intNm,setIntNm]=useState("");const[intE,setIntE]=useState("15");const[intSc,setIntSc]=useState("s2");const[intMd,setIntMd]=useState("other");
  const[addM,setAddM]=useState(false);const[addNm,setAddNm]=useState("");const[addE,setAddE]=useState("30");const[addSc,setAddSc]=useState("s2");const[addMd,setAddMd]=useState("focus");
  const[routeM,setRouteM]=useState(null);const[rNm,setRNm]=useState("");const[rE,setRE]=useState("30");const[rSc,setRSc]=useState("s2");const[rTy,setRTy]=useState("daily");const[rDs,setRDs]=useState([]);const[rN,setRN]=useState(1);const[rW,setRW]=useState(1);const[rMd,setRMd]=useState("focus");
  const[birthday,setBirthday]=useState("");const[lifeExp,setLifeExp]=useState(80);
  const[taskOrder,setTaskOrder]=useState({});
  const[editTask,setEditTask]=useState(null);const[etNm,setEtNm]=useState("");const[etEst,setEtEst]=useState("30");const[etSec,setEtSec]=useState("s2");const[etMd,setEtMd]=useState("focus");
  const[tickK,setTickK]=useState(0);const[syncOk,setSyncOk]=useState(false);const tT=useRef(null);

  useEffect(()=>{document.documentElement.setAttribute("data-theme",theme);localStorage.setItem("hc-theme",theme)},[theme]);
  useEffect(()=>{const iv=setInterval(()=>setTickK(k=>k+1),30000);return()=>clearInterval(iv)},[]);
  // ── Persistence: localStorage優先、Firebase は新デバイス用 ──
  const loadData=(d)=>{
    setRt(Array.isArray(d.routines)?d.routines:DR);
    setSc(Array.isArray(d.sections)?d.sections:DS);
    setEx(Array.isArray(d.extras)?d.extras:[]);
    if(d.comp&&typeof d.comp==="object")setCp(d.comp);else setCp({});
    if(d.birthday)setBirthday(d.birthday);
    if(d.lifeExp)setLifeExp(d.lifeExp);
    if(d.taskOrder&&typeof d.taskOrder==="object")setTaskOrder(d.taskOrder);
  };
  useEffect(()=>{
    const local=sto.get(SK);
    if(local){loadData(local);setSyncOk(true);setLoaded(true)}
    else{fbRef.once("value").then(snap=>{const d=snap.val();if(d){loadData(d);sto.set(SK,d)}setSyncOk(true);setLoaded(true)}).catch(()=>setLoaded(true))}
  },[]);
  const save=useCallback(()=>{
    const data={routines,sections,extras,comp,birthday,lifeExp,taskOrder};
    sto.set(SK,data);fbRef.set(data).catch(()=>{});
  },[routines,sections,extras,comp,birthday,lifeExp,taskOrder]);
  useEffect(()=>{if(loaded)save()},[routines,sections,extras,comp,birthday,lifeExp,taskOrder,loaded]);
  const sT=msg=>{setToast(msg);if(tT.current)clearTimeout(tT.current);tT.current=setTimeout(()=>setToast(""),2400)};
  const isT=sel===td();const shD=o=>{const d=new Date(sel+"T00:00:00");d.setDate(d.getDate()+o);if(toDS(d)>td())return;setSel(toDS(d))};

  const tasks=useMemo(()=>{
    const base=routines.filter(r=>mRec(r.recur,sel)).map(r=>({id:r.id,name:r.name,est:r.est,section:r.section,icon:r.icon,type:"routine",mode:r.mode||"other"}));
    const ex=extras.filter(e=>e.date===sel);const all=[...base,...ex];
    const so=sections.map(s=>s.id);const to={routine:0,manual:1,interrupt:2,continuation:3};
    all.sort((a,b)=>{const sa=so.indexOf(a.section);const sb=so.indexOf(b.section);if(sa!==sb)return sa-sb;return(to[a.type]||0)-(to[b.type]||0)});return all;
  },[routines,sections,extras,sel]);

  const stats=useMemo(()=>{let done=0,pend=0,dM=0,rM=0,pM=0;
    tasks.forEach(t=>{const cv=comp[`${t.id}_${sel}`];if(isD(cv)){done++;const s=cv.s,e=cv.e;if(s&&e){let m=tMin(e)-tMin(s);if(m<0)m+=1440;dM+=m}else dM+=(t.est||0)}else if(isR(cv)){const s=cv.s;if(s){const m=tMin(now())-tMin(s);rM+=m>0?m:0}}else{pend++;pM+=(t.est||0)}});
    const eM=tMin(now())+rM+pM;return{done,pend,total:tasks.length,dM,pM,endTime:minToT(eM>1440?eM-1440:eM),eM}
  },[tasks,comp,sel,tickK]);

  const tasksBySec=useMemo(()=>{const m={};sections.forEach(s=>m[s.id]=[]);tasks.forEach(t=>{if(m[t.section])m[t.section].push(t);else if(sections.length)m[sections[0].id].push(t)});
    const order=taskOrder[sel];if(order){Object.keys(m).forEach(sid=>{m[sid].sort((a,b)=>{const ai=order.indexOf(a.id);const bi=order.indexOf(b.id);if(ai===-1&&bi===-1)return 0;if(ai===-1)return 1;if(bi===-1)return-1;return ai-bi})})}
    return m},[tasks,sections,taskOrder,sel]);

  // ── Move task up/down ──
  const moveTask=(id,secId,dir)=>{
    const secTasks=tasksBySec[secId]||[];const ids=secTasks.map(t=>t.id);
    const idx=ids.indexOf(id);if(idx===-1)return;
    const ni=idx+dir;if(ni<0||ni>=ids.length)return;
    [ids[idx],ids[ni]]=[ids[ni],ids[idx]];
    const allIds=[];sections.forEach(s=>{const st=tasksBySec[s.id]||[];if(s.id===secId)allIds.push(...ids);else allIds.push(...st.map(t=>t.id))});
    setTaskOrder(prev=>({...prev,[sel]:allIds}))};

  // ── Edit task ──
  const openEdit=(t)=>{setEditTask(t);setEtNm(t.name);setEtEst(String(t.est));setEtSec(t.section);setEtMd(t.mode||"other")};
  const saveEdit=()=>{if(!editTask||!etNm.trim())return;
    if(editTask.type==="routine"){setRt(p=>p.map(r=>r.id===editTask.id?{...r,name:etNm.trim(),est:parseInt(etEst)||30,section:etSec,mode:etMd}:r))}
    else{setEx(p=>p.map(e=>e.id===editTask.id?{...e,name:etNm.trim(),est:parseInt(etEst)||30,section:etSec,mode:etMd}:e))}
    setEditTask(null);sT("更新しました")};
  const secLoad=useMemo(()=>{const m={};sections.forEach(s=>{const ts=tasksBySec[s.id]||[];const te=ts.reduce((a,t)=>a+(t.est||0),0);const cap=tMin(s.end)-tMin(s.start);m[s.id]={te,cap,pct:cap?Math.round(te/cap*100):0}});return m},[tasksBySec,sections]);

  // Weekly data for charts
  const weekData=useMemo(()=>{const labels=[];const pcts=[];for(let i=6;i>=0;i--){const d=ago(i);labels.push(dL(d));const done=routines.filter(r=>isD(comp[`${r.id}_${d}`])).length;pcts.push(routines.length?Math.round(done/routines.length*100):0)}return{labels,pcts}},[routines,comp]);

  // Section distribution for pie chart
  const secDist=useMemo(()=>{const labels=[];const data=[];sections.forEach(s=>{const ts=tasksBySec[s.id]||[];const total=ts.reduce((a,t)=>a+(t.est||0),0);if(total>0){labels.push(s.name);data.push(total)}});return{labels,data}},[sections,tasksBySec]);

  // Mode distribution
  const modeDist=useMemo(()=>{const map={};tasks.forEach(t=>{const mid=t.mode||"other";map[mid]=(map[mid]||0)+(t.est||0)});
    const labels=[],data=[],colors=[];Object.entries(map).forEach(([mid,est])=>{if(est>0){const m=modeMap[mid]||modeMap.other;labels.push(m.icon+m.name);data.push(est);colors.push(m.color)}});
    return{labels,data,colors}},[tasks]);

  const toggle=id=>{if(aa)return;const key=`${id}_${sel}`;const cur=comp[key];
    if(isD(cur)){setCp(p=>{const n={...p};delete n[key];return n});return}
    if(isR(cur)){setCp(p=>({...p,[key]:{...cur,e:now()}}));const task=tasks.find(t=>t.id===id);sT("完了");const nx=tasks.find(t=>t.id!==id&&!isD(comp[`${t.id}_${sel}`])&&!isR(comp[`${t.id}_${sel}`]));setTimeout(()=>setAA({id,name:task?task.name:"",est:task?task.est:0,st:cur.s,et:now(),nxId:nx?nx.id:null,nxNm:nx?nx.name:null}),350);return}

        <div style={{fontSize:13,color:"var(--t4)",marginBottom:8}}>他の端末にデータを移す場合に使用</div>
        <div style={{display:"flex",gap:6,marginBottom:24}}>
          <button style={{...B,flex:1}} onClick={()=>{const d=sto.get(SK);const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`habit-chain-backup-${td()}.json`;a.click();URL.revokeObjectURL(url);sT("エクスポート完了")}}>↓ エクスポート</button>
          <button style={{...B,flex:1}} onClick={()=>{const input=document.createElement("input");input.type="file";input.accept=".json";input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.routines)setRt(d.routines);if(d.sections)setSc(d.sections);if(d.extras)setEx(d.extras);if(d.comp)setCp(d.comp);if(d.birthday)setBirthday(d.birthday);if(d.lifeExp)setLifeExp(d.lifeExp);sT("インポート完了")}catch{sT("ファイルが不正です")}};reader.readAsText(file)};input.click()}}>↑ インポート</button>
        </div>
        <div style={{fontSize:12,color:"var(--t3)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:10}}>データ</div>
        <button style={{...B,color:"var(--red-t)"}} onClick={reset}>すべてリセット</button>
      </div>}

      {/* ═ MODALS ═ */}
      {addM&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:"100%",maxWidth:360}}>
          <div style={{fontSize:16,fontWeight:300,marginBottom:14}}>タスクを追加</div>
          <input style={{...I,marginBottom:10}} value={addNm} onChange={e=>setAddNm(e.target.value)} placeholder="タスク名" autoFocus/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>見積もり（分）</div><input type="number" style={I} value={addE} onChange={e=>setAddE(e.target.value)}/></div>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>セクション</div><select style={Sl} value={addSc} onChange={e=>setAddSc(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div>
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>モード</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
            {MODES.map(m=><button key={m.id} onClick={()=>setAddMd(m.id)} style={{background:addMd===m.id?m.bg:"transparent",border:`1px solid ${addMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"6px 10px",fontSize:12,color:addMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F,transition:"all .2s"}}>{m.icon} {m.name}</button>)}
          </div>
          <div style={{display:"flex",gap:8}}><button onClick={addMan} style={{...B,flex:1,color:"var(--t1)"}}>追加</button><button onClick={()=>setAddM(false)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
        </div>
      </div>}

      {intM&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:"100%",maxWidth:360}}>
          <div style={{fontSize:16,color:"var(--amber-t)",fontWeight:300,marginBottom:4}}>⚡ 割り込み</div>
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>実行中タスクは自動中断されます</div>
          <input style={{...I,marginBottom:10}} value={intNm} onChange={e=>setIntNm(e.target.value)} placeholder="割り込み内容" autoFocus/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>見積もり</div><input type="number" style={I} value={intE} onChange={e=>setIntE(e.target.value)}/></div>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>セクション</div><select style={Sl} value={intSc} onChange={e=>setIntSc(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div>
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>モード</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
            {MODES.map(m=><button key={m.id} onClick={()=>setIntMd(m.id)} style={{background:intMd===m.id?m.bg:"transparent",border:`1px solid ${intMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"6px 10px",fontSize:12,color:intMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F,transition:"all .2s"}}>{m.icon} {m.name}</button>)}
          </div>
          <div style={{display:"flex",gap:8}}><button onClick={addInt} style={{...B,flex:1,color:"var(--amber-t)"}}>割り込み開始</button><button onClick={()=>setIntM(false)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
        </div>
      </div>}

      {routeM&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:"100%",maxWidth:380,maxHeight:"90vh",overflow:"auto"}}>
          <div style={{fontSize:16,fontWeight:300,marginBottom:14}}>{routeM==="new"?"新規ルーチン":"ルーチン編集"}</div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>名前</div>
          <input style={{...I,marginBottom:10}} value={rNm} onChange={e=>setRNm(e.target.value)} autoFocus/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>見積もり</div><input type="number" style={I} value={rE} onChange={e=>setRE(e.target.value)}/></div>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>セクション</div><select style={Sl} value={rSc} onChange={e=>setRSc(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div>
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>モード</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {MODES.map(m=><button key={m.id} onClick={()=>setRMd(m.id)} style={{background:rMd===m.id?m.bg:"transparent",border:`1px solid ${rMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"6px 10px",fontSize:12,color:rMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F,transition:"all .2s"}}>{m.icon} {m.name}</button>)}
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>繰り返し</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
            {[["daily","毎日"],["weekly","毎週"],["monthly","毎月"],["nth_weekday","第N曜"]].map(([v,l])=><button key={v} onClick={()=>{setRTy(v);setRDs([])}} style={{...B,fontSize:11,padding:"6px 10px",background:rTy===v?"var(--bg4)":"transparent",color:rTy===v?"var(--t1)":"var(--t3)"}}>{l}</button>)}
          </div>
          {rTy==="weekly"&&<div style={{display:"flex",gap:4,marginBottom:10}}>{["日","月","火","水","木","金","土"].map((d,i)=><button key={i} onClick={()=>setRDs(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])} style={{...B,fontSize:11,padding:"6px 10px",minWidth:32,background:rDs.includes(i)?"var(--bg4)":"transparent",color:rDs.includes(i)?"var(--t1)":"var(--t3)"}}>{d}</button>)}</div>}
          {rTy==="monthly"&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:10}}>{Array.from({length:31},(_,i)=>i+1).map(d=><button key={d} onClick={()=>setRDs(p=>p.includes(d)?p.filter(x=>x!==d):[...p,d])} style={{...B,fontSize:10,padding:"4px 6px",minWidth:26,background:rDs.includes(d)?"var(--bg4)":"transparent",color:rDs.includes(d)?"var(--t1)":"var(--t3)"}}>{d}</button>)}</div>}
          {rTy==="nth_weekday"&&<div style={{display:"flex",gap:8,marginBottom:10}}><select style={Sl} value={rN} onChange={e=>setRN(+e.target.value)}>{[1,2,3,4,5].map(n=><option key={n} value={n}>第{n}</option>)}</select><select style={Sl} value={rW} onChange={e=>setRW(+e.target.value)}>{["日","月","火","水","木","金","土"].map((d,i)=><option key={i} value={i}>{d}</option>)}</select></div>}
          <div style={{display:"flex",gap:8}}><button onClick={saveRt} style={{...B,flex:1,color:"var(--t1)"}}>保存</button>{routeM!=="new"&&<button onClick={()=>{setRt(p=>p.filter(r=>r.id!==routeM));setRouteM(null);sT("削除")}} style={{...B,color:"var(--red-t)"}}>削除</button>}<button onClick={()=>setRouteM(null)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
        </div>
      </div>}

      {aa&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:"100%",maxWidth:360}}>
          <div style={{fontSize:11,color:"var(--t3)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:4}}>完了</div>
          <div style={{fontSize:17,fontWeight:300,marginBottom:16}}>{aa.name}</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {aa.nxId&&<button onClick={()=>hAA("next")} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t1)",fontSize:15,fontWeight:300,fontFamily:F,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>▶ 次: {aa.nxNm}</button>}
            <button onClick={()=>hAA("break")} style={{background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t2)",fontSize:15,fontWeight:300,fontFamily:F,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>☕ 休憩</button>
            <button onClick={()=>hAA("interrupt")} style={{background:"var(--bg4)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--t2)",fontSize:15,fontWeight:300,fontFamily:F,padding:"12px 14px",cursor:"pointer",textAlign:"left"}}>⏸ 中断（続き追加）</button>
            <button onClick={()=>setAA(null)} style={{background:"transparent",border:"1px solid var(--border)",borderRadius:4,color:"var(--t3)",fontSize:13,fontFamily:F,padding:"10px 14px",cursor:"pointer"}}>閉じる</button>
          </div>
        </div>
      </div>}

      {/* ═ EDIT TASK MODAL ═ */}
      {editTask&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"var(--overlay)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeModal .15s"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:8,padding:"24px 20px",width:"100%",maxWidth:360}}>
          <div style={{fontSize:16,fontWeight:300,marginBottom:14}}>タスクを編集</div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>タスク名</div>
          <input style={{...I,marginBottom:10}} value={etNm} onChange={e=>setEtNm(e.target.value)} autoFocus/>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>見積もり（分）</div><input type="number" style={I} value={etEst} onChange={e=>setEtEst(e.target.value)}/></div>
            <div style={{flex:1}}><div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>セクション</div><select style={Sl} value={etSec} onChange={e=>setEtSec(e.target.value)}>{sections.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}</select></div>
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>モード</div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:12}}>
            {MODES.map(m=><button key={m.id} onClick={()=>setEtMd(m.id)} style={{background:etMd===m.id?m.bg:"transparent",border:`1px solid ${etMd===m.id?m.color+"60":"var(--border)"}`,borderRadius:4,padding:"6px 10px",fontSize:12,color:etMd===m.id?m.color:"var(--t4)",cursor:"pointer",fontFamily:F,transition:"all .2s"}}>{m.icon} {m.name}</button>)}
          </div>
          <div style={{display:"flex",gap:8}}><button onClick={saveEdit} style={{...B,flex:1,color:"var(--t1)"}}>保存</button><button onClick={()=>setEditTask(null)} style={{...B,flex:1,background:"transparent"}}>キャンセル</button></div>
        </div>
      </div>}

      <div style={{position:"fixed",bottom:toast?32:-60,left:"50%",transform:"translateX(-50%)",background:"var(--bg3)",border:"1px solid var(--border2)",borderRadius:6,padding:"10px 24px",fontSize:14,color:"var(--t1)",transition:"bottom .4s cubic-bezier(.4,0,.2,1)",zIndex:300,whiteSpace:"nowrap"}}>{toast}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
